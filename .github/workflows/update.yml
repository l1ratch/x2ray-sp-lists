name: update-v2raya-rules-with-geosite

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Cleanup old files
        run: |
          set -e
          find . -maxdepth 1 \
            ! -name '.' \
            ! -name '.git' \
            ! -name '.github' \
            ! -name 'README.md' \
            ! -name 'for-gfw.txt' \
            -exec rm -rf {} +

      - name: Download upstream files
        run: |
          set -e
          BASE_URL="https://raw.githubusercontent.com/v2rayA/dist-v2ray-rules-dat/master"

          FILES="
          apple-cn.txt
          china-list.txt
          direct-list.txt
          direct-tld-list.txt
          geoip.dat
          geoip.dat.sha256sum
          geosite.dat
          geosite.dat.sha256sum
          gfw.txt
          google-cn.txt
          greatfire.txt
          proxy-list.txt
          proxy-tld-list.txt
          reject-list.txt
          rules.zip
          rules.zip.sha256sum
          win-extra.txt
          win-spy.txt
          win-update.txt
          "

          for file in $FILES; do
            echo "Downloading $file"
            wget -q -O "$file" "$BASE_URL/$file" || echo "Skip $file"
          done

      - name: Merge custom domains into gfw.txt
        run: |
          set -e
          if [ -f for-gfw.txt ]; then
            cat for-gfw.txt >> gfw.txt
          fi
          sort -u gfw.txt -o gfw.txt

      - name: Merge custom domains into proxy-list.txt
        run: |
          set -e
          if [ -f for-gfw.txt ]; then
            cat for-gfw.txt >> proxy-list.txt
          fi
          sort -u proxy-list.txt -o proxy-list.txt

      - name: Rebuild geosite.dat
        run: |
          set -e
          if command -v v2ctl >/dev/null 2>&1; then
            echo "Building geosite.dat from txt sources"
            v2ctl geosite -u geosite.dat -o geosite.dat
          else
            echo "v2ctl not installed, skipping geosite.dat rebuild"
          fi

      - name: Commit changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Update v2rayA rules and geosite.dat with custom domains" || echo "No changes"
          git push

