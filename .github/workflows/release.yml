name: release
    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4

      - name: Download latest release info
        id: release
        run: |
          set -e

          TARGET_TAG_URL="https://api.github.com/repos/$TARGET/releases/latest"

          TARGET_LATEST_VER=$(curl -s ${TARGET_TAG_URL} | grep 'tag_name' | cut -d\" -f4)
          NORMALIZED_TARGET_TAG="${TARGET_LATEST_VER//[^0-9]/}"

          echo "version=$TARGET_LATEST_VER" >> $GITHUB_OUTPUT
          echo "tag=$NORMALIZED_TARGET_TAG" >> $GITHUB_OUTPUT

          mkdir -p x2ray-lists

          cd x2ray-lists

          FILES="
          gfw.txt
          proxy-list.txt
          direct-list.txt
          geosite.dat
          geosite.dat.sha256sum
          geoip.dat
          geoip.dat.sha256sum
          rules.zip
          rules.zip.sha256sum
          "

          for file in $FILES; do
            wget -q https://github.com/$TARGET/releases/latest/download/$file
          done

      - name: Merge custom domains into gfw.txt
        run: |
          set -e

          if [ -f for-gfw.txt ]; then
            cat for-gfw.txt >> x2ray-lists/gfw.txt
          fi

          sort -u x2ray-lists/gfw.txt -o x2ray-lists/gfw.txt

      - name: Merge custom domains into proxy-list.txt
        run: |
          set -e

          if [ -f for-gfw.txt ]; then
            cat for-gfw.txt >> x2ray-lists/proxy-list.txt
          fi

          sort -u x2ray-lists/proxy-list.txt -o x2ray-lists/proxy-list.txt

      - name: Commit changes
        run: |
          set -e

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add x2ray-lists

          git commit -m "Update rules ${{ steps.release.outputs.version }}" || echo "No changes"

          git push

      - name: Create tag
        run: |
          set -e

          TAG=${{ steps.release.outputs.tag }}

          git tag -f "$TAG"
          git push origin "$TAG" --force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: Release ${{ steps.release.outputs.version }}
          files: |
            x2ray-lists/*
